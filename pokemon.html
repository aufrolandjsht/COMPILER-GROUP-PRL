<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angelenean Pokedex</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts for cartoon style -->
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .pokeball-bg {
      position: absolute;
      z-index: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      overflow: hidden;
    }
    .pokeball {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      border: 12px solid #d32f2f;
      width: 220px;
      height: 220px;
      left: -60px;
      top: 60px;
      opacity: 0.25;
    }
    .pokeball2 {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      border: 12px solid #d32f2f;
      width: 180px;
      height: 180px;
      right: -40px;
      top: 320px;
      opacity: 0.25;
    }
    .pokeball3 {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      border: 12px solid #d32f2f;
      width: 140px;
      height: 140px;
      left: 60px;
      bottom: -40px;
      opacity: 0.25;
    }
    .title {
      font-family: 'Luckiest Guy', cursive, Arial, sans-serif;
      text-align: center;
      color: #ffe600;
      text-shadow: 3px 3px 0 #1976d2, 6px 6px 0 #d32f2f;
      font-size: 2.8em;
      margin-top: 40px;
      margin-bottom: 10px;
      letter-spacing: 2px;
      z-index: 1;
      position: relative;
    }
    .search-bar {
      display: flex;
      justify-content: center;
      margin: 30px 0 10px 0;
      z-index: 1;
      position: relative;
    }
    .search-bar input {
      padding: 12px;
      font-size: 1.1em;
      border-radius: 8px 0 0 8px;
      border: 2px solid #d32f2f;
      width: 320px;
      outline: none;
    }
    .search-bar .btn {
      padding: 12px 20px;
      border-radius: 0 8px 8px 0;
      background: #d32f2f;
      color: #fff;
      border: none;
      font-size: 1.1em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .search-bar .btn:hover {
      background: #b71c1c;
    }
    .pokemon-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      margin: 20px 0;
      z-index: 1;
      position: relative;
    }
    .pokemon-card {
      background: #d32f2f;
      border-radius: 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      padding: 18px 16px 12px 16px;
      width: 200px;
      text-align: center;
      color: #fff;
      font-family: 'Luckiest Guy', cursive, Arial, sans-serif;
      position: relative;
      transition: transform 0.2s;
      cursor: pointer;
    }
    .pokemon-card:hover {
      transform: scale(1.07);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }
    .pokemon-card img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      margin-bottom: 8px;
      background: #fff;
      border-radius: 50%;
      border: 3px solid #ffe600;
    }
    .pokemon-card .poke-type {
      background: #fff;
      color: #d32f2f;
      border-radius: 8px;
      padding: 2px 10px;
      font-size: 0.95em;
      margin: 6px 0 10px 0;
      display: inline-block;
      font-family: Arial, sans-serif;
    }
    .pokemon-card .btn {
      background: #ffe600;
      color: #d32f2f;
      border: none;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 1em;
      font-family: 'Luckiest Guy', cursive, Arial, sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .pokemon-card .btn:hover {
      background: #fff176;
    }
    .compare-section {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 60px;
      margin: 40px 0 20px 0;
      z-index: 1;
      position: relative;
    }
    .compare-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      padding: 24px 18px;
      width: 240px;
      text-align: center;
      color: #d32f2f;
      font-family: 'Luckiest Guy', cursive, Arial, sans-serif;
      position: relative;
    }
    .compare-card img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      margin-bottom: 10px;
      background: #ffe600;
      border-radius: 50%;
      border: 3px solid #d32f2f;
    }
    .compare-card ul {
      list-style: none;
      padding: 0;
      margin: 10px 0 0 0;
      font-family: Arial, sans-serif;
      font-size: 1em;
      color: #333;
    }
    .vs {
      font-size: 2.5em;
      font-weight: bold;
      color: #ffe600;
      text-shadow: 2px 2px 0 #d32f2f;
      margin-top: 60px;
      font-family: 'Luckiest Guy', cursive, Arial, sans-serif;
    }
    .winner {
      text-align: center;
      margin-bottom: 30px;
      z-index: 1;
      position: relative;
    }
    .winner h2 {
      font-family: 'Luckiest Guy', cursive, Arial, sans-serif;
      color: #ffe600;
      text-shadow: 2px 2px 0 #1976d2, 4px 4px 0 #d32f2f;
      font-size: 2em;
      margin: 0;
    }
    @media (max-width: 900px) {
      .compare-section { flex-direction: column; gap: 20px; align-items: center; }
      .vs { margin-top: 0; }
    }
  </style>
</head>
<body>
  <div class="pokeball-bg">
    <div class="pokeball"></div>
    <div class="pokeball2"></div>
    <div class="pokeball3"></div>
  </div>
  <header>
    <h1 class="title">Angelenean Pokedex</h1>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search Pokémon...">
      <button class="btn" onclick="searchPokemon()">🔍</button>
    </div>
  </header>

  <section class="pokemon-grid" id="pokemonGrid">
    <!-- Cards will be rendered here -->
  </section>

  <section class="compare-section" id="compareSection" style="display:none;">
    <div class="compare-card" id="compareCard1"></div>
    <div class="vs">VS</div>
    <div class="compare-card" id="compareCard2"></div>
  </section>

  <section class="winner" id="winnerSection" style="display:none;">
    <h2 id="winnerText"></h2>
  </section>

  <script>
  let pokedex = [];
  let selectedForCompare = [];

  async function fetchPokemonList(limit = 20) {
    const res = await fetch(`https://pokeapi.co/api/v2/pokemon?limit=${limit}`);
    const data = await res.json();
    const promises = data.results.map(async (poke) => {
      const pokeRes = await fetch(poke.url);
      const pokeData = await pokeRes.json();
      return {
        name: pokeData.name.charAt(0).toUpperCase() + pokeData.name.slice(1),
        type: pokeData.types.map(t => t.type.name).join('/'),
        img: pokeData.sprites.front_default,
        stats: {
          HP: pokeData.stats[0].base_stat,
          Attack: pokeData.stats[1].base_stat,
          Defense: pokeData.stats[2].base_stat,
          Speed: pokeData.stats[5].base_stat
        }
      };
    });
    pokedex = await Promise.all(promises);
    renderGrid(pokedex);
  }

  function renderGrid(pokemonList) {
    const grid = document.getElementById('pokemonGrid');
    grid.innerHTML = '';
    pokemonList.forEach((poke, idx) => {
      const card = document.createElement('div');
      card.className = 'pokemon-card';
      card.innerHTML = `
        <div style="position:absolute;top:10px;right:10px;font-size:0.9em;background:#fff;color:#d32f2f;border-radius:6px;padding:2px 8px;font-family:Arial;">#${idx+1}</div>
        <img src="${poke.img}" alt="${poke.name}">
        <h2>${poke.name}</h2>
        <div class="poke-type">${poke.type}</div>
        <button class="btn" onclick="selectForCompare(${idx})">Compare</button>
      `;
      grid.appendChild(card);
    });
  }

  function searchPokemon() {
    const input = document.getElementById('searchInput').value.trim().toLowerCase();
    const filtered = pokedex.filter(p => p.name.toLowerCase().includes(input));
    renderGrid(filtered.length ? filtered : pokedex);
  }

  function selectForCompare(idx) {
    if (selectedForCompare.length === 2) selectedForCompare = [];
    selectedForCompare.push(pokedex[idx]);
    if (selectedForCompare.length === 2) showCompare();
  }

  function showCompare() {
    document.getElementById('compareSection').style.display = 'flex';
    document.getElementById('winnerSection').style.display = 'block';

    const [poke1, poke2] = selectedForCompare;
    document.getElementById('compareCard1').innerHTML = `
      <img src="${poke1.img}" alt="${poke1.name}">
      <h2>${poke1.name}</h2>
      <ul>
        <li>HP: <span style="color:#388e3c;font-weight:bold">${poke1.stats.HP}</span></li>
        <li>Attack: <span style="color:#d32f2f;font-weight:bold">${poke1.stats.Attack}</span></li>
        <li>Defense: <span style="color:#1976d2;font-weight:bold">${poke1.stats.Defense}</span></li>
        <li>Speed: <span style="color:#fbc02d;font-weight:bold">${poke1.stats.Speed}</span></li>
      </ul>
    `;
    document.getElementById('compareCard2').innerHTML = `
      <img src="${poke2.img}" alt="${poke2.name}">
      <h2>${poke2.name}</h2>
      <ul>
        <li>HP: <span style="color:#388e3c;font-weight:bold">${poke2.stats.HP}</span></li>
        <li>Attack: <span style="color:#d32f2f;font-weight:bold">${poke2.stats.Attack}</span></li>
        <li>Defense: <span style="color:#1976d2;font-weight:bold">${poke2.stats.Defense}</span></li>
        <li>Speed: <span style="color:#fbc02d;font-weight:bold">${poke2.stats.Speed}</span></li>
      </ul>
    `;
    // Simple winner logic: sum stats
    const sum1 = Object.values(poke1.stats).reduce((a,b)=>a+b,0);
    const sum2 = Object.values(poke2.stats).reduce((a,b)=>a+b,0);
    let winner = "It's a tie!";
    if (sum1 > sum2) winner = `Most likely to win: ${poke1.name}`;
    else if (sum2 > sum1) winner = `Most likely to win: ${poke2.name}`;
    document.getElementById('winnerText').textContent = winner;
  }

  // Initial fetch
  fetchPokemonList(151);
</script>
</body>
</html>
